<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<h1>Book Your Appointment</h1>
<p>You are booking Slot ID: <span th:text="${slotId}">0</span></p>
<p>You must be signed in. Booking is linked to your logged-in account.</p>

<form action="/book" method="post">
    <input name="slotId" th:value="${slotId}" type="hidden"/>
    <button type="submit">Confirm Booking</button>
</form>

<br>
<a href="/slots">Back to Slots</a>
</body>
</html>
