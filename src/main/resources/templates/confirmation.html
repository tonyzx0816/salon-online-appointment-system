<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<h1>Booking Confirmed!</h1>
<p>Success! Your appointment has been scheduled.</p>
<div th:if="${appointment != null}">
    <p>Appointment ID: <span th:text="${appointment.appointmentId}">0</span></p>
    <p>Provider ID: <span th:text="${appointment.providerId}">0</span></p>
    <p>Start: <span th:text="${appointment.startTime}">start</span></p>
    <p>End: <span th:text="${appointment.endTime}">end</span></p>
    <p>
        <button type="button"
                th:attr="data-appointment-id=${appointment.appointmentId}"
                id="btn-test-notification">
            Test mock external notification (HTTP)
        </button>
    </p>
    <pre id="notification-result" style="background:#f5f5f5;padding:8px;max-width:40rem;white-space:pre-wrap;"></pre>
</div>
<a href="/">Return to Home</a>
<script th:if="${appointment != null}">
(function () {
    var btn = document.getElementById('btn-test-notification');
    var out = document.getElementById('notification-result');
    if (!btn || !out) return;
    btn.addEventListener('click', function () {
        var id = btn.getAttribute('data-appointment-id');
        out.textContent = 'Calling /api/appointments/' + id + '/confirmation-notification …';
        fetch('/api/appointments/' + id + '/confirmation-notification', { method: 'POST' })
            .then(function (r) {
                return r.text().then(function (t) {
                    if (!r.ok) {
                        out.textContent = 'HTTP ' + r.status + '\n' + t;
                        return;
                    }
                    try {
                        out.textContent = JSON.stringify(JSON.parse(t), null, 2);
                    } catch (e) {
                        out.textContent = t;
                    }
                });
            })
            .catch(function (e) {
                out.textContent = 'Request failed: ' + e;
            });
    });
})();
</script>
</body>
</html>
