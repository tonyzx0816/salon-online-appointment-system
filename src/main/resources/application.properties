spring.config.import=optional:classpath:application-local.properties
spring.application.name=starter-demo

# --- SMTP (sender mailbox) ---
# Gmail: use an App Password (Google Account - Security - App passwords), not your normal password.
#
# IMPORTANT: ${NAME} references an env var or property NAME — never wrap your email in ${}.
# Put secrets only in src/main/resources/application-local.properties (gitignored) or export SPRING_MAIL_*.
#
# Example:
#   export SPRING_MAIL_USERNAME=you@gmail.com
#   export SPRING_MAIL_PASSWORD=your-16-char-app-password
#   export APP_MAIL_FROM='Salon Bookings <you@gmail.com>'
#
# Or: copy application-local.properties.example -> application-local.properties and run with profile "local".
#
# Second email to provider staff (DB user linked to provider): off by default — seed emails like jane@salon.com are fake and cause Gmail bounces. Set true when staff addresses are real.
app.mail.notify-provider=false

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=15000
spring.mail.properties.mail.smtp.timeout=15000

# Expose basic actuator observability endpoints for system management.
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
